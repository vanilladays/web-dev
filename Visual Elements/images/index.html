<!DOCTYPE html>
<html>

<head>

<body>
    <h1 style="font-family: Arial, Helvetica, sans-serif;"> Welcome to the Cat Den! </h1>

    <body style="background-color: white;"> </body>
    <div class="whatever">
        <h2> Images </h2>

        </h3>
        <img src="images/cat.jpg" height="300px" width="380px">

    </div>
    <br>

        <h4 style="font-family: Arial, Helvetica, sans-serif;"> Videos </h4>

        </video>

        </p>
        <br>
        <audio controls>
